services:
  - type: web
    name: mineria
    runtime: python
    buildCommand: apt-get install -y --no-install-recommends openjdk-17-jdk-headless && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"
      - key: MOTHERDUCK_TOKEN
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: JAVA_HOME
        value: /usr/lib/jvm/java-17-openjdk-amd64
      - key: PYSPARK_PYTHON
        value: python3
      - key: SPARK_LOCAL_IP
        value: "127.0.0.1"
