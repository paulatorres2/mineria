services:
  - type: web
    name: mineria
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"
      - key: MOTHERDUCK_TOKEN
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: STATIC_RESULTS
        value: "1"
