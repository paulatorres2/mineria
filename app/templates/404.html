<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Página no encontrada</title>
  <style>
    :root { --dark: #05373e; --blue: #0d89a1; --cream: #f3d7b6; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px;
    }
    h1 { font-size: 6rem; color: var(--blue); font-weight: 900; line-height: 1; }
    p { margin-top: 16px; font-size: 1rem; opacity: 0.7; }
    a {
      display: inline-block;
      margin-top: 32px;
      color: var(--blue);
      text-decoration: none;
      border-bottom: 1px solid var(--blue);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>La página que buscas no existe.</p>
  <a href="/">← Volver al inicio</a>
</body>
</html>
